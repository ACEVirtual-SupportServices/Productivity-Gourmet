<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You | Productivity Gourmet</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Fraunces:wght@600;700&family=Work+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-K29156K1NJ"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-K29156K1NJ');
    </script>
    
    <style>
        :root {
            --turquoise: #0097B2;
            --turquoise-dark: #007A91;
            --black: #0A0A0A;
            --white: #FFFFFF;
            --gray-600: #525252;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Work Sans', sans-serif;
            color: var(--black);
            background: linear-gradient(135deg, #f5f5f5 0%, #ffffff 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        
        .success-container {
            text-align: center;
            max-width: 600px;
        }
        
        .checkmark {
            width: 80px;
            height: 80px;
            background: var(--turquoise);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 2rem;
            animation: scaleIn 0.5s ease-out;
        }
        
        @keyframes scaleIn {
            from {
                transform: scale(0);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }
        
        .checkmark::after {
            content: '✓';
            font-size: 3rem;
            color: var(--white);
            font-weight: bold;
        }
        
        h1 {
            font-family: 'DM Sans', sans-serif;
            font-size: 2.5rem;
            margin-bottom: 1rem;
            color: var(--black);
            animation: fadeInUp 0.6s ease-out 0.2s both;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        p {
            font-size: 1.15rem;
            color: var(--gray-600);
            line-height: 1.7;
            margin-bottom: 2rem;
            animation: fadeInUp 0.6s ease-out 0.4s both;
        }
        
        .btn {
            display: inline-block;
            padding: 1rem 2.5rem;
            background: var(--turquoise);
            color: var(--white);
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s ease;
            animation: fadeInUp 0.6s ease-out 0.6s both;
        }
        
        .btn:hover {
            background: var(--turquoise-dark);
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0, 151, 178, 0.2);
        }
        
        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }
            
            p {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <main id="main-content">
    <div class="success-container">
        <div class="checkmark"></div>
        <h1>Thank You!</h1>
        <p>
            Your message has been received. I'll get back to you within 24 hours on business days. 
            Looking forward to discussing how we can work together!
        </p>
        <a href="index.html" class="btn">Return to Homepage</a>
    </div>
</body>
</html>
